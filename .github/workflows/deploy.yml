name: Push 기반 CI/CD 테스트

# container branch에서 push 이벤트(리슨 -> on)가 발생되면 아래 설정한 내용 작동
on:
    push:
        branches: ["container"]

jobs:
    # app 관련 이미지 생성 -> 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: 코드 checkout
              uses: actions/checkout@v4
            # 도커 허브 로그인 -> ID/PW
            # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
            - name: Docker hub login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
    # EC2에 docker-compose.yml, 설정파일 등 copy, 도커컴포즈 작동
    # cd:
