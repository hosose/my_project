name: Push 기반 CI/CD 테스트

# container branch에서 push 이벤트(리슨 -> on)가 발생되면 아래 설정한 내용 작동
on:
    push:
        branches: ["container"]

jobs:
    # app 관련 이미지 생성 -> 허브에 푸시 (소스코드/리소스 모두 포함되어 있음)
    ci:
        runs-on: ubuntu-latest
        steps:
            - name: 코드 checkout
              uses: actions/checkout@v4
            # 도커 허브 로그인 -> ID/PW
            # 시크릿 변수로 DOCKER_USERNAME, DOCKER_PASSWORD 생성
            - name: Docker hub login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            # fastapi-app 에 대한 이미지 build push
            - name: Build and Push fastapi app
              uses: docker/build-push-action@v4
              with:
                context: ./app
                file: ./app/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:1.1
            # nginx-proxy:1.0 형태로 이미지 빌드 -> 푸시
            - name: Build and Push proxy-nginx
              uses: docker/build-push-action@v4
              with:
                context: ./nginx
                file: ./nginx/Dockerfile
                push: true
                tags: ${{ secrets.DOCKER_USERNAME }}/nginx-proxy:1.0
    
    # 실습
    # EC2에 docker-compose.yml, 설정파일 등 copy, 도커컴포즈 작동
    cd:
        # ci 작업이 완료된 후 진행
        needs: ci
        # cd 작업을 위한 서버 세팅
        runs-on: ubuntu-latest
        steps:
          # 1. 소스코드 체크아웃
          - name: 코드 checkout
            uses: actions/checkout@v4

          # 1. 필요 파일(docker-compose.yml)을 EC2로 복사
          - name: Copy files to EC2 via SCP
            uses: appleboy/scp-action@v0.1.7
            with:
              host: ${{ secrets.HOST }}
              username: ${{ secrets.USERNAME }}
              key: ${{ secrets.EC2_KEY }}
              port: 22
              source: "docker-compose.yml"
              target: /home/ubuntu

          # 2. EC2 접속 후 down -> pull -> up 순서로 실행
          - name: Execute remote SSH commands
            uses: appleboy/ssh-action@v1.0.3
            with:
              host: ${{ secrets.HOST }}
              username: ${{ secrets.USERNAME }}
              key: ${{ secrets.EC2_KEY }}
              script: |
                # 작업 디렉토리 이동 (docker-compose.yml 존재하는 위치)
                cd /home/ubuntu
                # 필요시 .env 생성 -> 시크릿 변수 읽어서 파일 처리 (여기서는 생략)
                # 최신 이미지 가져오기
                docker-compose pull
                # 컨테이너 재생성
                docker-compose up -d
                # 사용하지 않는 이미지 삭제
                docker image prune -f
